<!DOCTYPE html>
<html lang="en" class="lenis lenis-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Square Pie</title>
  <meta name="description" content="Square Pie admin login portal." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="cursor" id="cursor"><div class="cursor__circle"></div><div class="cursor__text"><span class="cursor__label tt-u fs-20"></span></div></div>

  <aside class="menu-overlay" id="menuOverlay">
    <a href="/" class="menu-overlay__item">Home</a>
    <a href="/menu.html" class="menu-overlay__item">Menu</a>
    <a href="/about.html" class="menu-overlay__item">About</a>
    <a href="/photos.html" class="menu-overlay__item">Photos</a>
  </aside>

  <div class="menu-label" id="menuLabel">
    <div class="menu-label__bg"></div>
    <button class="menu-label__hamburger" id="hamburgerBtn" aria-label="Menu"><div class="menu-label__line"></div><div class="menu-label__line"></div></button>
    <a href="/" class="menu-label__logo"><img src="/assets/SPLogo.png" alt="Square Pie" class="menu-label__logo-img" /></a>
  </div>

  <header class="nav tt-u fs-24 c-secondary">
    <nav class="nav__items">
      <a href="/" class="link-hover underline" data-label="Home"><span class="link-hover__text">Home</span></a>
      <a href="/menu.html" class="link-hover underline" data-label="Menu"><span class="link-hover__text">Menu</span></a>
    </nav>
    <nav class="nav__items">
      <a href="/about.html" class="link-hover underline" data-label="About"><span class="link-hover__text">About</span></a>
      <a href="/photos.html" class="link-hover underline" data-label="Photos"><span class="link-hover__text">Photos</span></a>
    </nav>
  </header>

  <div id="view">
    <main>
      <!-- ADMIN LOGIN -->
      <section class="admin-login" id="adminLogin">
        <div class="admin-login__container">
          <div class="admin-login__header">
            <img src="/assets/SPLogo.png" alt="Square Pie" class="admin-login__logo" />
            <h1 class="admin-login__title tt-u">Admin Portal</h1>
            <p class="admin-login__subtitle tt-u">Authorized Personnel Only</p>
          </div>

          <form class="admin-login__form" id="adminLoginForm" autocomplete="off">
            <div class="admin-login__field">
              <label for="adminUsername" class="admin-login__label tt-u">Username</label>
              <input type="text" id="adminUsername" class="admin-login__input" placeholder="Enter username" required autocomplete="off" />
            </div>
            <div class="admin-login__field">
              <label for="adminPassword" class="admin-login__label tt-u">Password</label>
              <div class="admin-login__password-wrap">
                <input type="password" id="adminPassword" class="admin-login__input" placeholder="Enter password" required autocomplete="off" />
                <button type="button" class="admin-login__eye" id="togglePassword" aria-label="Toggle password visibility">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="admin-login__error" id="loginError">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
              <span>Invalid credentials. Please try again.</span>
            </div>

            <button type="submit" class="admin-login__submit tt-u" id="loginBtn">
              <span class="admin-login__submit-text">Sign In</span>
              <span class="admin-login__submit-loader">
                <span></span><span></span><span></span>
              </span>
            </button>
          </form>

          <div class="admin-login__security">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <span class="tt-u">Secure Connection</span>
          </div>
        </div>

        <!-- Decorative background elements -->
        <div class="admin-login__bg-pattern"></div>
      </section>

      <footer class="footer">
        <div class="footer__info c-accent tt-u fs-24 sp-40">
          <p>801 East Passyunk Avenue • Philadelphia, PA 19147</p>
        </div>
        <div class="footer__copyright c-accent tt-u fs-20">© 2026 Square Pie Philly. All rights reserved.</div>
      </footer>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
  <script type="module" src="/admin.js"></script>
</body>
</html>
